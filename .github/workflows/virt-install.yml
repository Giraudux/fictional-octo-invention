name: virt-install

on:
  workflow_dispatch:

jobs:
  virt-install:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - id: cache
      uses: actions/cache@v5
      with:
        path: ubuntu-24.04.4-desktop-amd64.iso
        key: ubuntu-24.04.4-desktop-amd64
    - if: steps.cache.outputs.cache-hit != 'true'
      run: wget --quiet https://releases.ubuntu.com/24.04.4/ubuntu-24.04.4-desktop-amd64.iso
    - run: |
        set -x
        sudo apt -y update
        sudo apt -y install libvirt-daemon-system virtinst qemu-system partclone
        cat > user-data << 'EOF'
        #cloud-config
        autoinstall:
          version: 1
          source:
            id: ubuntu-desktop-minimal
          identity:
            password: "$6$exDY1mhS4KUYCE/2$zmn9ToZwTKLhCw.b4/b.ZRTIZM30JZ4QrOQ2aOXJ8yk96xpcCof0kxKwuX1kqLG/ygbJ1f8wxED22bTL4F46P0"
            username: ubuntu
            hostname: ubuntu
          error-commands:
            - poweroff
          user-data:
            write_files:
            - path: /usr/lib/repart.d/50-root.conf
              content: |
                [Partition]
                Type=root
          late-commands:
            - grep --exclude-dir={/proc/,/run/,/dev/} -r / -e "dc216ac4a4c232815731979db6e494f315b507dd" || true 2> /dev/null
        EOF
        sudo mv ubuntu-24.04.4-desktop-amd64.iso /var/lib/libvirt/boot/
      # Failure token: "subiquity/Error/run"
    - timeout-minutes: 20
      shell: script --return --quiet --command "bash {0}"
      run: |
        sudo virt-install \
            --noreboot \
            --check disk_size=off \
            --disk format=raw,size=16 \
            --osinfo ubuntunoble \
            --cdrom /var/lib/libvirt/boot/ubuntu-24.04.4-desktop-amd64.iso \
            --extra-args "autoinstall console=ttyS0 systemd.journald.forward_to_console=yes" \
            --location /var/lib/libvirt/boot/ubuntu-24.04.4-desktop-amd64.iso,kernel=/casper/vmlinuz,initrd=/casper/initrd \
            --cloud-init user-data=user-data \
            --boot uefi \
            --graphics none
    - run: |
        set -x
        sudo ls -l /var/lib/libvirt/*
        sudo mv /var/lib/libvirt/images/ubuntu24.04.img "${{ github.workspace }}"
        sudo chown "$USER:$USER" ubuntu24.04.img
        sudo partclone.imager -c -s ubuntu24.04.img -a0 | zstdmt --rsyncable -o ubuntu24.04.000
    - uses: actions/upload-artifact@v4
      with:
        name: ubuntu24.04.000
        path: ubuntu24.04.000
        compression-level: 0
    - uses: actions/upload-artifact@v4
      with:
        name: ubuntu24.04.img
        path: ubuntu24.04.img
