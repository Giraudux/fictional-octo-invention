name: mkosi

on:
  workflow_dispatch:
    inputs:
      release:
        type: string
        default: noble
        required: true

jobs:
  mkosi:
    runs-on: ubuntu-latest
    steps:
    - name: Install mkosi
      uses: systemd/mkosi@main
    - name: Install dependencies
      run: |
        sudo apt -y update
        mkosi dependencies -- --profile runtime | xargs -d '\n' sudo apt -y install qemu-user-static
    - name: Start VM
      run: |
        set -x

        mkdir -p mkosi.repart/ mkosi.extra/etc/apt/sources.list.d/

        cat << EOF > mkosi.conf
        [Distribution]
        Distribution=ubuntu
        Release=${{ inputs.release }}
        Architecture=x86-64
        Repositories=universe

        [Output]
        Format=disk

        [Content]
        Packages=grub-efi,ubuntu-minimal,openssh-server,linux-image-generic
        WithRecommends=yes
        Bootable=yes
        Ssh=always

        [Runtime]
        TPM=no
        RuntimeBuildSources=yes
        KernelCommandLineExtra=systemd.journald.forward_to_console=yes
        EOF

        cat << EOF > mkosi.repart/00-esp.conf
        [Partition]
        Type=esp
        Format=vfat
        CopyFiles=/boot:/
        CopyFiles=/efi:/
        SizeMinBytes=512M
        SizeMaxBytes=512M
        EOF

        cat << EOF > mkosi.repart/10-root.conf
        [Partition]
        Type=root
        Format=ext4
        CopyFiles=/
        SizeMinBytes=8G
        SizeMaxBytes=8G
        EOF

        cat << EOF > mkosi.extra/etc/apt/sources.list.d/ubuntu.sources
        Types: deb
        URIs: http://archive.ubuntu.com/ubuntu/
        Suites: ${{ inputs.release }} ${{ inputs.release }}-updates ${{ inputs.release }}-backports
        Components: main restricted universe multiverse
        Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

        Types: deb
        URIs: http://security.ubuntu.com/ubuntu/
        Suites: ${{ inputs.release }}-security
        Components: main restricted universe multiverse
        Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
        EOF

        sudo tee /usr/lib/systemd/system/mkosi-vm.service > /dev/null << EOF
        [Unit]
        Description=mkosi vm service

        [Service]
        User=$USER
        ExecStart=mkosi --directory="${{ github.workspace }}" vm
        EOF

        mkosi genkey
        mkosi build
        sudo systemctl daemon-reload
        sudo systemctl start mkosi-vm.service
    - name: Wait
      timeout-minutes: 1
      run: |
        until mkosi ssh -- -o BatchMode=yes exit
        do
          sleep 1
        done
    -  name: Exec
       run: |
        set -x

        mkosi ssh -- -o BatchMode=yes << EOF
        set -xe
        sudo apt -y update
        EOF
    - name: Journal
      if: always()
      run: journalctl -u mkosi-vm.service
