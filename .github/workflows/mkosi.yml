name: mkosi

on:
  workflow_dispatch:

jobs:
  mkosi:
    runs-on: ubuntu-latest
    steps:
    - name: setup-mkosi
      uses: systemd/mkosi@main
    - run: |
        sudo apt -y update
        sudo apt -y install python3-pefile qemu-system
    - timeout-minutes: 10
      run: |
        set -x
        mkdir -p mkosi.extra/etc/apt/sources.list.d/ mkosi.extra/root/
        cat << EOF > mkosi.extra/etc/apt/sources.list.d/ubuntu.sources
        Types: deb
        URIs: http://archive.ubuntu.com/ubuntu/
        Suites: noble noble-updates noble-backports
        Components: main restricted universe multiverse
        Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
        Types: deb
        URIs: http://security.ubuntu.com/ubuntu/
        Suites: noble-security
        Components: main restricted universe multiverse
        Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
        EOF
        cat << EOF > mkosi.extra/root/.profile
        set -x
        apt -y update
        poweroff
        EOF
        mkosi \
          --distribution=ubuntu \
          --release=noble \
          --package=systemd-boot,systemd-resolved,ubuntu-minimal,linux-image-generic \
          --repositories=universe \
          --autologin=yes \
          --ephemeral=yes \
          --tpm=no \
          --force \
          --debug \
          --format=disk \
          --bootable=yes \
          vm
